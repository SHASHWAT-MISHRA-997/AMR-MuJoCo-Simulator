slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    transform_publish_period: 0.05
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.25
    minimum_travel_distance: 0.08
    minimum_travel_heading: 0.08
    map_update_interval: 1.0
    enable_interactive_mode: false
